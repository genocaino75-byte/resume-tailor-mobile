<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Resume Tailored to JD</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Sora', -apple-system, sans-serif;
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px;
    background: #F9FAFB;
    color: #1a1a1a;
    line-height: 1.65;
  }
  h1 { color: #3B0764; font-size: 26px; margin-bottom: 8px; }
  p { color: #374151; font-size: 15px; margin: 0 0 16px; }
  .contact-box {
    background: #FFFFFF;
    border: 2px solid #7C3AED;
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    margin-top: 24px;
    box-shadow: 0 4px 14px rgba(124,58,237,0.12);
  }
  .contact-box a {
    display: inline-block;
    font-weight: 600;
    font-size: 16px;
    color: #7C3AED;
    text-decoration: none;
  }
  .contact-box a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Contact Us</h1>
<p>Have a question, found a bug, or need help with your account? We'd love to hear from you.</p>

<div class="contact-box">
  <a href="mailto:support@cainbuilds.com">support@cainbuilds.com</a>
</div>

</body>
</html>
