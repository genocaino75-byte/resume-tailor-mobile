<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - Resume Tailor</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Sora', -apple-system, sans-serif;
    max-width: 420px;
    margin: 0 auto;
    padding: 40px 24px;
    background: #F9FAFB;
    color: #1a1a1a;
  }
  h1 { color: #3B0764; font-size: 24px; margin-bottom: 8px; }
  p.sub { color: #6B7280; font-size: 14px; margin-top: 0; margin-bottom: 24px; }
  input {
    width: 100%;
    padding: 14px;
    font-size: 14px;
    font-family: 'Sora', sans-serif;
    border: 2px solid #7C3AED;
    border-radius: 8px;
    box-sizing: border-box;
    margin-bottom: 12px;
    outline: none;
  }
  button {
    width: 100%;
    padding: 16px;
    font-size: 15px;
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    color: #ffffff;
    background: linear-gradient(135deg, #3B0764, #7C3AED);
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  button:disabled { background: #E5E7EB; color: #9CA3AF; cursor: not-allowed; }
  .message { padding: 14px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
  .error { background: #FEE2E2; color: #DC2626; }
  .success { background: #D1FAE5; color: #065F46; }
  .hint { font-size: 12px; color: #6B7280; margin-bottom: 20px; }
</style>
</head>
<body>

<h1>Reset your password</h1>
<p class="sub">Choose a new password for your Resume Tailor account.</p>

<div id="message"></div>

<div id="form-area">
  <input type="password" id="password" placeholder="New password" />
  <input type="password" id="confirm" placeholder="Confirm new password" />
  <p class="hint">Must be at least 10 characters and contain at least 2 numbers.</p>
  <button id="submit">Update Password</button>
</div>

<script>
  const API_URL = "https://ai-resume-tailor-api.onrender.com";
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  const messageEl = document.getElementById("message");
  const formArea = document.getElementById("form-area");
  const submitBtn = document.getElementById("submit");

  function showMessage(text, type) {
    messageEl.innerHTML = '<div class="message ' + type + '">' + text + '</div>';
  }

  if (!token) {
    showMessage("This reset link is invalid or incomplete. Please request a new one from the app.", "error");
    formArea.style.display = "none";
  }

  submitBtn.addEventListener("click", async function () {
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    if (password !== confirm) {
      showMessage("Passwords don't match.", "error");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Updating...";

    try {
      const res = await fetch(API_URL + "/api/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: token, newPassword: password })
      });

      const data = await res.json();

      if (!res.ok) {
        showMessage(data.error || "Something went wrong. Please try again.", "error");
        submitBtn.disabled = false;
        submitBtn.textContent = "Update Password";
        return;
      }

      showMessage("Password updated successfully. You can now log in with your new password in the app.", "success");
      formArea.style.display = "none";
    } catch (err) {
      showMessage("Couldn't reach the server. Please try again.", "error");
      submitBtn.disabled = false;
      submitBtn.textContent = "Update Password";
    }
  });
</script>

</body>
</html>
